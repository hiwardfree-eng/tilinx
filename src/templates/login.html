<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilinX Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#0f0f14; color:#e0e0e0; display:flex; align-items:center; justify-content:center; height:100vh; }
.box { background:#1a1a24; padding:40px; border-radius:12px; border:1px solid #2a2a3a; text-align:center; }
h1 { color:#00ff88; margin-bottom:20px; }
.input { padding:10px 14px; border-radius:6px; border:1px solid #2a2a3a; background:#0f0f14; color:#e0e0e0; font-size:16px; width:250px; margin-bottom:15px; }
.btn { padding:10px 24px; border-radius:6px; border:none; background:#00ff88; color:#000; font-size:16px; cursor:pointer; }
.btn:hover { background:#00cc66; }
.error { color:#ff4444; margin-top:10px; display:none; }
</style>
</head>
<body>
<div class="box">
  <h1>⚡ TilinX</h1>
  <input class="input" id="password" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
  <br>
  <button class="btn" onclick="login()">Enter</button>
  <div class="error" id="error">Invalid password</div>
</div>
<script>
async function login() {
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: document.getElementById('password').value}),
  });
  if (r.ok) { window.location.href = '/'; }
  else { document.getElementById('error').style.display = 'block'; }
}
</script>
</body>
</html>
