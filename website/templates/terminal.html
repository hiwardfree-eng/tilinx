<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilinX Terminal V10</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00ff41;--gd:rgba(0,255,65,0.4);--p:#b44aff;--pd:rgba(130,0,255,0.3);--pk:#e879f9;--bg:#000;--t:#c0e0c0;--f:'JetBrains Mono',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--g);font-family:var(--f);font-size:14px}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#snow-c{z-index:1;opacity:0.65}
.term{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;background:rgba(0,5,0,0.92);backdrop-filter:blur(4px)}
.thdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--gd);flex-shrink:0;background:rgba(0,3,0,0.95)}
.ttl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--g);text-shadow:0 0 8px var(--g)}
.ttl .blink{animation:b 1.2s step-end infinite}
@keyframes b{50%{opacity:0}}
.ts{display:flex;gap:14px;font-size:9px;color:var(--gd);letter-spacing:0.5px}
.tbody{flex:1;overflow-y:auto;padding:8px 14px 2px;display:flex;flex-direction:column}
.tbody::-webkit-scrollbar{width:3px}
.tbody::-webkit-scrollbar-track{background:transparent}
.tbody::-webkit-scrollbar-thumb{background:var(--gd);border-radius:99px}
.out{flex:1;overflow-y:auto;min-height:0;padding-bottom:4px}
.out .l{margin-bottom:1px;white-space:pre-wrap;word-break:break-word;font-size:12.5px;line-height:1.5}
.out .l.g{color:var(--g)}
.out .l.d{color:rgba(0,255,65,0.5)}
.out .l.p{color:var(--p)}
.out .l.pk{color:var(--pk)}
.out .l.r{color:#ff4444}
.out .l.y{color:#ffdd44}
.out .l.b{color:#4488ff}
.out .l.w{color:#e0ffe0}
.out .l.bb{font-weight:700}
.out .l.cmd{margin-top:3px;color:var(--g);font-weight:700}
.out .l.cmd:before{content:'\276F ';color:var(--gd)}
.il{display:flex;align-items:center;gap:8px;padding:5px 0 8px;flex-shrink:0;border-top:1px solid rgba(0,255,65,0.06)}
.prompt{font-size:12.5px;font-weight:700;color:var(--g);text-shadow:0 0 5px var(--g);white-space:nowrap}
.prompt .h{color:var(--p)}
.inp{flex:1;background:transparent;border:none;color:var(--g);font-family:var(--f);font-size:12.5px;outline:none;caret-color:var(--g)}
.inp::placeholder{color:rgba(0,255,65,0.12);font-size:11px}
.boot{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
.boot.hide{opacity:0;pointer-events:none}
.boot-ascii{font-size:6px;line-height:1.1;color:var(--p);text-shadow:0 0 15px var(--p);text-align:center;white-space:pre;margin-bottom:16px}
.boot-bar{width:280px;height:3px;background:rgba(0,20,0,0.8);border:1px solid var(--gd);border-radius:4px;overflow:hidden;margin:6px auto}
.boot-fill{height:100%;width:0%;background:var(--g);box-shadow:0 0 12px var(--g);transition:width .15s}
.boot-txt{color:var(--gd);font-size:10px;letter-spacing:2px;margin-top:8px}
.sbtn{position:fixed;bottom:16px;right:16px;z-index:50;background:rgba(0,8,0,0.7);border:1px solid var(--pd);border-radius:10px;color:var(--p);padding:6px 12px;font-family:var(--f);font-size:10px;cursor:pointer;transition:.3s;backdrop-filter:blur(4px)}
.sbtn:hover{border-color:var(--p);box-shadow:0 0 12px var(--pd)}
@media(max-width:600px){
  .thdr{padding:6px 10px}
  .ts{font-size:8px;gap:8px}
  .ttl{font-size:10px}
  .tbody{padding:4px 8px 2px}
  .out .l{font-size:11px}
  .inp,.prompt{font-size:11px}
  .boot-ascii{font-size:3px}
  .boot-bar{width:200px}
}
</style>
</head>
<body>

<canvas id="mx"></canvas>
<canvas id="snow-c"></canvas>

<div class="boot" id="boot">
  <div class="boot-ascii" id="ba"></div>
  <div class="boot-bar"><div class="boot-fill" id="bf"></div></div>
  <div class="boot-txt" id="bt">INICIALIZANDO...</div>
</div>

<div class="term" id="term">
  <div class="thdr">
    <div class="ttl">TILINX TERMINAL <span style="color:var(--p)">v10</span> <span class="blink">&#9608;</span></div>
    <div class="ts"><span id="tf">FPS: --</span><span id="tc">CPU: --%</span><span id="tr">RAM: --%</span></div>
  </div>
  <div class="tbody" id="tbody">
    <div class="out" id="out"></div>
    <div class="il">
      <span class="prompt"><span class="h">root</span>@tilinx:~$</span>
      <input class="inp" id="inp" type="text" placeholder="type help" spellcheck="false" autocomplete="off" autofocus/>
    </div>
  </div>
</div>

<button class="sbtn" id="sbtn">&#10052; NIEVE</button>

<script>
(function(){
  var w=window
  // ---- DOM refs ----
  var O=document.getElementById("out"),I=document.getElementById("inp"),B=document.getElementById("tbody")
  var BOOT=document.getElementById("boot"),BF=document.getElementById("bf"),BT=document.getElementById("bt"),BA=document.getElementById("ba")
  if(!O||!I)return // bail if critical elements missing

  var h=[],hi=-1,snow=true
  var tIdx=-1,tMatches=[],tOrig=""
  var S=document.getElementById("sbtn")

  // ---- Boot ----
  BA.textContent=
  "\n████████╗██╗██╗     ██╗███╗   ██╗██╗  ██╗\n╚══██╔══╝██║██║     ██║████╗  ██║╚██╗██╔╝\n   ██║   ██║██║     ██║██╔██╗ ██║ ╚███╔╝\n   ██║   ██║██║     ██║██║╚██╗██║ ██╔██╗\n   ██║   ██║███████╗██║██║ ╚████║██╔╝ ██╗\n   ╚═╝   ╚═╝╚══════╝╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝"

  var BM=["Booting TilinX Terminal...","Loading Modules...","Initializing System...","Connection Established","Terminal Ready"]
  var p=0
  var bi=setInterval(function(){
    p+=Math.random()*18+4;if(p>=100){p=100;clearInterval(bi)}
    BF.style.width=p+"%"
    if(BT)BT.textContent=BM[Math.min(Math.floor(p/20),BM.length-1)]
  },180)
  setTimeout(function(){
    BOOT.classList.add("hide");I.focus();hA();hU()
    setInterval(hU,2000)
  },2800)

  // ---- Matrix ----
  try{(function(){
    var c=document.getElementById("mx");if(!c)return
    var cx=c.getContext("2d"),ch="アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモラリルレロ01"
    var w,h,dr=[];var W=18
    function rs(){w=c.width=innerWidth;h=c.height=innerHeight;var n=Math.ceil(w/W);while(dr.length<n)dr.push(Math.random()*-h/W);dr=dr.slice(0,n)}
    function dw(){
      cx.fillStyle="rgba(0,0,0,0.06)";cx.fillRect(0,0,w,h)
      for(var i=0;i<dr.length;i++){
        cx.fillStyle="rgba(0,255,65,"+(Math.random()>0.95?0.7:0.06+Math.random()*0.14)+")";cx.font="12px JetBrains Mono,monospace"
        cx.fillText(ch[Math.random()*ch.length|0],i*W,dr[i]*W)
        if(dr[i]*W>h&&Math.random()>0.975)dr[i]=0
        dr[i]+=0.4+Math.random()*0.3
      }
      requestAnimationFrame(dw)
    }
    rs();w.addEventListener("resize",rs);dw()
  }())catch(e){}

  // ---- Snow ----
  try{(function(){
    var c=document.getElementById("snow-c");if(!c)return
    var cx=c.getContext("2d"),w,h,fl=[]
    function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
    function init(){rs();for(var i=0;i<70;i++)fl.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2.5+1,s:Math.random()*0.7+0.2,o:Math.random()*0.5+0.15,w:Math.random()*2-1})}
    function dw(){
      cx.clearRect(0,0,w,h)
      if(snow)for(var i=0;i<fl.length;i++){
        fl[i].y+=fl[i].s;fl[i].x+=Math.sin(fl[i].y*0.01)*0.3+fl[i].w*0.1
        if(fl[i].y>h+10){fl[i].y=-10;fl[i].x=Math.random()*w}
        if(fl[i].x<0)fl[i].x=w;if(fl[i].x>w)fl[i].x=0
        cx.beginPath();cx.arc(fl[i].x,fl[i].y,fl[i].r,0,Math.PI*2)
        cx.fillStyle="rgba(180,74,255,"+fl[i].o+")";cx.fill()
        cx.shadowColor="rgba(180,74,255,0.4)";cx.shadowBlur=8
      }
      requestAnimationFrame(dw)
    }
    rs();w.addEventListener("resize",function(){rs();init()});init();dw()
  }())catch(e){}

  function tS(){snow=!snow;S.textContent=snow?"\u2744 NIEVE":"\u2600 SIN NIEVE"}
  if(S)S.onclick=tS

  function hU(){
    var xhr=new XMLHttpRequest()
    xhr.open("GET","/api/terminal-stats",true)
    xhr.onload=function(){
      if(xhr.status===200){
        try{
          var d=JSON.parse(xhr.responseText)
          var e1=document.getElementById("tf");if(e1)e1.textContent="FPS: "+(d.fps||"--")
          var e2=document.getElementById("tc");if(e2)e2.textContent="CPU: "+(d.cpu_percent||"--")+"%"
          var e3=document.getElementById("tr");if(e3)e3.textContent="RAM: "+(d.ram_percent||"--")+"%"
        }catch(e){hUFallback()}
      }else{hUFallback()}
    }
    xhr.onerror=function(){hUFallback()}
    xhr.send()
    function hUFallback(){
      var e1=document.getElementById("tf");if(e1)e1.textContent="FPS: "+(60+Math.floor(Math.random()*70))
      var e2=document.getElementById("tc");if(e2)e2.textContent="CPU: "+(20+Math.floor(Math.random()*40))+"%"
      var e3=document.getElementById("tr");if(e3)e3.textContent="RAM: "+(30+Math.floor(Math.random()*35))+"%"
    }
  }

  function pr(h,c){var d=document.createElement("div");d.className="l "+(c||"");d.innerHTML=h;O.appendChild(d);B.scrollTop=B.scrollHeight}
  function cmd(s){var d=document.createElement("div");d.className="l cmd";d.textContent=s;O.appendChild(d);B.scrollTop=B.scrollHeight}

  function fu(s){var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return d+"d "+h+"h "+m+"m"}
  function randIP(){var p=[];for(var i=0;i<4;i++)p.push(Math.floor(Math.random()*254+1));return p.join(".")}
  function padRight(s,n){while(s.length<n)s+=" ";return s}
  function repeatStr(s,n){var r="";while(n-->0)r+=s;return r}

  // ---- Commands ----
  function hA(f){
    var g={
      system:"Info del sistema",cpu:"Detalles CPU",ram:"Uso de RAM",gpu:"Info GPU",disk:"Uso del disco",
      temp:"Temperatura",network:"Interfaces de red",internet:"Estado conexion",
      ping:"<host> Prueba de latencia",fps:"Analizador FPS",optimizer:"Optimizar sistema",
      boost:"Modo rendimiento",turbo:"Turbo +25%",ultra:"Ultra rendimiento",
      sensitivity:"Analizar sensibilidad",crosshair:"Configurar mira",tracking:"Analisis tracking",
      reaction:"Tiempo reaccion",training:"Centro entrenamiento",movement:"Analisis movimiento",
      aimtest:"Prueba precision",godmode:"Activar todos los modulos",
      services:"Servicios activos",monitor:"Monitor en vivo",status:"Estado sistema",
      logs:"Registros",report:"Generar reporte",security:"Escaneo seguridad",
      neofetch:"Info sistema estilo neofetch",whoami:"Usuario actual",
      history:"Historial comandos",date:"Fecha y hora",clear:"Limpiar terminal",
      snow:"Activar/desactivar nieve",matrix:"Efecto matrix",
      color:"<color> Cambiar color (green,purple,blue,red,pink)",
      uptime:"Tiempo activo",exit:"Cerrar sesion",restart:"Reiniciar",shutdown:"Apagar",help:"<cmd> Ayuda",
      banner:"Mostrar banner ASCII",calc:"<expr> Calculadora",echo:"<text> Eco de texto",
      sysinfo:"Info detallada del sistema (API)",hack:"Simulacion de hackeo",
      env:"Variables de entorno",cls:"Limpiar terminal"
    }
    if(f&&g[f]){pr("<b style='color:var(--g)'>"+f+"</b> &mdash; "+g[f]);return}
    pr("<span style='color:var(--p);font-weight:700'>╔══════════════════════════╗</span>")
    pr("<span style='color:var(--p);font-weight:700'>║   TILINX TERMINAL V10    ║</span>")
    pr("<span style='color:var(--p);font-weight:700'>╚══════════════════════════╝</span>")
    pr("")
    var gr=[["SISTEMA","system cpu ram gpu disk temp network internet uptime neofetch whoami date sysinfo".split(" ")],
            ["MONITOREO","status monitor logs report security services ping".split(" ")],
            ["GAMING","fps optimizer boost turbo ultra sensitivity crosshair tracking reaction training movement aimtest".split(" ")],
            ["EPICO","godmode hack".split(" ")],
            ["TERMINAL","help clear cls history snow matrix color echo banner calc env exit restart shutdown".split(" ")]]
    for(var i=0;i<gr.length;i++){
      pr("<span style='color:var(--pk)'>"+gr[i][0]+"</span>","bb")
      for(var j=0;j<gr[i][1].length;j++){
        var k=gr[i][1][j];pr("  <span style='color:var(--g);font-weight:700'>"+k+"</span>  <span style='color:rgba(0,255,65,0.4)'>"+(g[k]||"")+"</span>")
      }
      pr("")
    }
  }

  function box(t){pr("<span style='color:var(--gd)'>╔══════════════════════════════════╗</span>");pr("<span style='color:var(--g)'>║           "+t+(t.length<20?"         ":"")+"        ║</span>");pr("<span style='color:var(--gd)'>╚══════════════════════════════════╝</span>")}

  // ---- System Commands ----
  function cSystem(){
    box("SYSTEM INFORMATION")
    pr("OS ............. <span style='color:var(--g)'>TilinX OS v10.0.0</span>")
    pr("Kernel ......... <span style='color:var(--g)'>6.8.0-tilinx-amd64</span>")
    pr("Host ........... <span style='color:var(--g)'>TilinX-PRO-7</span>")
    pr("Uptime ......... <span style='color:var(--g)'>"+fu(Math.floor(Math.random()*86400*14+3600))+"</span>")
    pr("Shell .......... <span style='color:var(--g)'>TilinX SH v10</span>")
    pr("Users .......... <span style='color:var(--g)'>root (admin)</span>")
  }
  function cCpu(){
    var u=20+Math.floor(Math.random()*50),f=(3.2+Math.random()*2.8).toFixed(1)
    box("CPU INFORMATION")
    pr("Model ......... <span style='color:var(--g)'>AMD Ryzen 9 "+Math.floor(5000+Math.random()*2000)+"X</span>")
    pr("Cores ......... <span style='color:var(--g)'>"+Math.floor(Math.random()*4+8)+"C / "+Math.floor((Math.random()*4+8)*2)+"T</span>")
    pr("Frequency ..... <span style='color:var(--g)'>"+f+" GHz</span>")
    pr("Usage ......... <span style='color:var(--g)'>"+u+"%</span>")
    pr("Temperature ... <span style='color:"+(u>60?"#ff4444":"var(--g)")+"'>"+(45+u*0.3).toFixed(1)+"°C</span>")
  }
  function cRam(){
    var t=16+Math.floor(Math.random()*16),u=Math.floor(t*(0.3+Math.random()*0.4)),p=Math.floor(u/t*100)
    box("MEMORY INFORMATION")
    pr("Total ........ <span style='color:var(--g)'>"+t+" GB</span>")
    pr("Used ......... <span style='color:"+(p>70?"#ff4444":"var(--g)")+"'>"+u+" GB ("+p+"%)</span>")
    pr("Free ......... <span style='color:var(--g)'>"+(t-u)+" GB</span>")
    pr("Type ......... <span style='color:var(--g)'>DDR5-6000</span>")
  }
  function cGpu(){
    var gs=[{n:"NVIDIA GeForce RTX 4090",v:"24 GB GDDR6X"},{n:"NVIDIA GeForce RTX 5090",v:"32 GB GDDR7"},{n:"AMD Radeon RX 7900 XTX",v:"24 GB GDDR6"}]
    var g=gs[Math.floor(Math.random()*gs.length)]
    box("GPU INFORMATION")
    pr("Model ........ <span style='color:var(--g)'>"+g.n+"</span>")
    pr("VRAM ......... <span style='color:var(--g)'>"+g.v+"</span>")
    pr("Temp ......... <span style='color:var(--g)'>"+(55+Math.floor(Math.random()*25))+"°C</span>")
  }
  function cDisk(){
    box("DISK INFORMATION")
    for(var i=0;i<4;i++){
      var m=["/","/home","/var","/tmp"][i],t=Math.floor(100+Math.random()*400),u=Math.floor(t*(0.2+Math.random()*0.5)),p=Math.floor(u/t*100)
      pr(m+"  "+t+"G  <span style='color:"+(p>75?"#ff4444":"var(--g)")+"'>"+p+"%</span>")
    }
  }
  function cTemp(){
    box("TEMPERATURES")
    pr("CPU ........ <span style='color:var(--g)'>"+(45+Math.random()*30).toFixed(1)+"°C</span>")
    pr("GPU ........ <span style='color:var(--g)'>"+(50+Math.random()*30).toFixed(1)+"°C</span>")
    pr("MBoard ..... <span style='color:var(--g)'>"+(35+Math.random()*15).toFixed(1)+"°C</span>")
  }
  function cNetwork(){
    box("NETWORK INTERFACES")
    for(var i=0;i<4;i++)pr("eth"+i+"  "+randIP()+"  <span style='color:var(--g)'>UP</span>")
  }
  function cInternet(){
    box("INTERNET STATUS")
    pr("Status ..... <span style='color:var(--g)'>CONNECTED</span>")
    pr("IP ......... <span style='color:var(--g)'>"+randIP()+"</span>")
    pr("Latency .... <span style='color:var(--g)'>"+(5+Math.random()*40).toFixed(0)+" ms</span>")
  }
  function cPing(host){
    if(!host){pr("Uso: ping &lt;host&gt;","y");return}
    pr("Ping a "+host+"...")
    var n=0
    var it=setInterval(function(){
      pr((n+1)+"  "+host+"  time="+(5+Math.random()*60).toFixed(1)+" ms","d")
      n++;if(n>=4){clearInterval(it);pr("--- "+host+" ping statistics ---");pr("4 transmitted, 4 received, 0% loss")}
    },600)
  }
  function cServices(){
    box("SYSTEM SERVICES")
    var sv=["tilinx-proxy","tilinx-api","tilinx-bot","nginx","postgresql","redis","docker","ssh","ufw","fail2ban"]
    for(var i=0;i<sv.length;i++)    pr("  <span style='color:var(--g)'>\u25CF</span> "+padRight(sv[i],18)+" <span style='color:var(--g)'>active</span>")
    pr("Total: "+sv.length+" servicios activos","d")
  }
  function cMonitor(){
    pr("MONITOR EN VIVO (actualizando cada 2s) — Presiona cualquier tecla para salir.","y")
    var run=true
    var it=setInterval(function(){
      if(!run){clearInterval(it);return}
      var cpu=20+Math.floor(Math.random()*50),ram=30+Math.floor(Math.random()*40)
      pr("["+new Date().toLocaleTimeString()+"] CPU: "+cpu+"%  RAM: "+ram+"%  DISK: "+(20+Math.floor(Math.random()*30))+"%","d")
    },2000)
    function hk(){run=false;clearInterval(it);pr("Monitor detenido.","d");document.removeEventListener("keydown",hk)}
    document.addEventListener("keydown",hk)
  }
  function cStatus(){
    box("SYSTEM STATUS")
    var c=20+Math.floor(Math.random()*30),r=30+Math.floor(Math.random()*25)
    pr("CPU ......... <span style='color:var(--g)'>"+c+"% - NORMAL</span>")
    pr("RAM ......... <span style='color:var(--g)'>"+r+"% - NORMAL</span>")
    pr("Network ..... <span style='color:var(--g)'>CONNECTED</span>")
    pr("Security .... <span style='color:var(--g)'>ALL OK</span>")
    pr("<span style='color:var(--g)'>OVERALL: OPERATIONAL</span>","bb")
  }
  function cLogs(){
    box("SYSTEM LOGS")
    var lg=["SYSTEM BOOT","SERVICE START: tilinx-proxy","SERVICE START: tilinx-api","NETWORK INIT: eth0","FIREWALL RULES LOADED","MEMORY TEST: PASSED","CPU INIT: 16 CORES","KERNEL LOAD: 6.8.0"]
    for(var i=0;i<lg.length;i++)pr("  ["+new Date().toLocaleTimeString()+"] "+lg[i],"d")
  }
  function cReport(){
    box("SYSTEM REPORT")
    pr("Fecha: "+new Date().toLocaleString())
    pr("Sistema: TilinX OS v10.0.0")
    pr("Uptime: "+fu(Math.floor(Math.random()*86400*14+3600)))
    pr("CPU: "+(20+Math.floor(Math.random()*25))+"% | RAM: "+(30+Math.floor(Math.random()*20))+"%")
    pr("<span style='color:var(--g)'>Reporte generado.</span>")
  }
  function cSecurity(){
    box("SECURITY SCAN")
    var ch=[["Firewall","ACTIVO"],["Fail2Ban","ACTIVO"],["Rootkits","NINGUNO"],["Malware","LIMPIO"],["SSL/TLS","VALIDO"],["DDoS Protection","ACTIVO"],["Key System","ENCRIPTADO"]]
    for(var i=0;i<ch.length;i++)pr("  "+padRight(ch[i][0],18)+" <span style='color:var(--g)'>"+ch[i][1]+"</span>")
    pr("")
    pr("<span style='color:var(--g);font-weight:700'>SEGURO — 7/7 CHECKS OK</span>")
  }
  function cFps(){
    var fps=60+Math.floor(Math.random()*85),min=Math.max(40,fps-30-Math.floor(Math.random()*20)),max=fps+Math.floor(Math.random()*30)
    box("FPS ANALYZER")
    pr("Current FPS .. <span style='color:var(--g);font-size:16px;font-weight:700'>"+fps+"</span>")
    pr("Minimum FPS .. <span style='color:#ff4444'>"+min+"</span>")
    pr("Maximum FPS .. <span style='color:var(--g)'>"+max+"</span>")
    pr("Performance .. <span style='color:"+(fps>=90?"var(--g)":"#ffdd44")+"'>"+(fps>=120?"EXCELLENT":fps>=90?"GOOD":"AVERAGE")+"</span>")
  }
  function cOptimizer(){
    pr("OPTIMIZANDO...","y")

  function cCalc(expr){
    if(!expr){pr("Uso: calc &lt;expr&gt; (ej. 2+2*3)","y");return}
    var sanitized=expr.replace(/[^0-9+\-*/.()% ]/g,"")
    if(!sanitized){pr("Expresion invalida","r");return}
    try{var result=eval(sanitized);pr(expr+" = <span style='color:var(--g);font-weight:700'>"+result+"</span>")}catch(e){pr("Error de calculo","r")}
  }

  // ---- Command Router ----
  function exec(cmd){
    if(!cmd.trim())return
    cmd(cmd.trim())
    h.push(cmd.trim());hi=h.length
    var p=cmd.trim().split(/\s+/),c=p[0].toLowerCase(),a=p.slice(1).join(" ")
    try{
      switch(c){
        case "help":hA(a);break
        case "clear":case "cls":O.innerHTML="";break
        case "history":cHistory();break
        case "whoami":cWhoami();break
        case "date":pr(new Date().toLocaleString());break
        case "neofetch":cNeofetch();break
        case "system":cSystem();break
        case "cpu":cCpu();break
        case "ram":cRam();break
        case "gpu":cGpu();break
        case "disk":cDisk();break
        case "temperature":case "temp":cTemp();break
        case "network":cNetwork();break
        case "internet":cInternet();break
        case "ping":cPing(a);break
        case "services":cServices();break
        case "monitor":cMonitor();break
        case "status":cStatus();break
        case "logs":cLogs();break
        case "report":cReport();break
        case "security":cSecurity();break
        case "fps":cFps();break
        case "optimizer":cOptimizer();break
        case "boost":cBoost();break
        case "turbo":cTurbo();break
        case "ultra":cUltra();break
        case "sensitivity":cSensitivity();break
        case "crosshair":cCrosshair();break
        case "tracking":cTracking();break
        case "reaction":cReaction();break
        case "training":cTraining();break
        case "movement":cMovement();break
        case "aimtest":cAimtest();break
        case "godmode":cGodmode();break
        case "snow":tS();pr(snow?"Nieve activada":"Nieve desactivada",snow?"p":"d");break
        case "matrix":pr("Matrix rain activado.","p");break
        case "banner":cBanner();break
        case "calc":cCalc(a);break
        case "echo":cEcho(a);break
        case "sysinfo":cSysinfo();break
        case "hack":cHack();break
        case "env":cEnv();break
        case "color":(function(){
          var cl={green:["#00ff41","#b44aff"],purple:["#b44aff","#e879f9"],blue:["#4488ff","#b44aff"],red:["#ff4444","#e879f9"],pink:["#e879f9","#b44aff"]}
          if(cl[a]){document.documentElement.style.setProperty("--g",cl[a][0]);document.documentElement.style.setProperty("--gd",cl[a][0]+"66");document.documentElement.style.setProperty("--p",cl[a][1]);pr("Color cambiado a "+a,"g")}
          else pr("Colores: green, purple, blue, red, pink","y")
        })();break
        case "uptime":pr("Uptime: "+fu(Math.floor(Math.random()*86400*7+86400)));break
        case "exit":pr("Sesion terminada.","d");break
        case "restart":pr("Reiniciando...","y");setTimeout(function(){O.innerHTML="";pr("Sistema reiniciado.","g")},800);break
        case "shutdown":pr("Apagando...","r");setTimeout(function(){O.innerHTML="";pr("Sistema apagado.","d")},1000);break
        default:pr("Comando desconocido: \""+c+"\". Escribe help.","r")
      }
    }catch(e){pr("Error: "+e.message,"r")}
  }

  // ---- Input ----
  I.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
      e.preventDefault();var v=I.value;I.value="";exec(v)
    }else if(e.key==="ArrowUp"){
      e.preventDefault();if(hi>0){hi--;I.value=h[hi]}
    }else if(e.key==="ArrowDown"){
      e.preventDefault();if(hi<h.length-1){hi++;I.value=h[hi]}else{hi=h.length;I.value=""}
    }else if(e.key==="Tab"){
      e.preventDefault()
      var cmds="help|clear|cls|history|whoami|date|neofetch|system|cpu|ram|gpu|disk|temp|temperature|network|internet|ping|services|monitor|status|logs|report|security|fps|optimizer|boost|turbo|ultra|sensitivity|crosshair|tracking|reaction|training|movement|aimtest|godmode|snow|matrix|color|uptime|exit|restart|shutdown|banner|calc|echo|sysinfo|hack|env".split("|")
      var pv=I.value.toLowerCase()
      if(pv===""){tIdx=-1;tMatches=[];return}
      if(tOrig!==pv||tMatches.length===0){
        tOrig=pv;tMatches=[]
        for(var i=0;i<cmds.length;i++){if(cmds[i].indexOf(pv)===0)tMatches.push(cmds[i])}
        tIdx=-1
      }
      if(tMatches.length===0)return
      tIdx=(tIdx+1)%tMatches.length
      I.value=tMatches[tIdx]
    }
  })

  document.addEventListener("click",function(){I.focus()})
})()
