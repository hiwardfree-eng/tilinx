<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilinX — Terminal V10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00ff41;--green-dim:rgba(0,255,65,0.4);--green-bg:rgba(0,10,0,0.92);--purple:#b44aff;--purple-dim:rgba(130,0,255,0.3);--pink:#e879f9;--text:#c0e0c0;--font:'JetBrains Mono',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--green);font-family:var(--font);font-size:14px;line-height:1.5;cursor:default}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(0,255,65,0.03),transparent);pointer-events:none;z-index:0}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35}
#snow-canvas{z-index:1;opacity:0.7;pointer-events:none}
.terminal{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;background:var(--green-bg);backdrop-filter:blur(4px)}
.term-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--green-dim);flex-shrink:0;background:rgba(0,5,0,0.95);min-height:44px}
.term-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--green);text-shadow:0 0 10px var(--green)}
.term-title .blink{animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}
.term-stats{display:flex;gap:16px;font-size:10px;color:var(--green-dim)}
.term-stats span{display:flex;align-items:center;gap:4px}
.term-stats .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.term-body{flex:1;overflow-y:auto;padding:10px 16px 4px;display:flex;flex-direction:column}
.term-body::-webkit-scrollbar{width:4px}
.term-body::-webkit-scrollbar-track{background:transparent}
.term-body::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:99px}
.term-output{flex:1;overflow-y:auto;min-height:0;padding-bottom:6px}
.term-output .line{margin-bottom:1px;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.5}
.term-output .line.green{color:var(--green)}
.term-output .line.dim{color:rgba(0,255,65,0.45)}
.term-output .line.purple{color:var(--purple)}
.term-output .line.pink{color:var(--pink)}
.term-output .line.red{color:#ff4444}
.term-output .line.yellow{color:#ffdd44}
.term-output .line.blue{color:#4488ff}
.term-output .line.white{color:#e0ffe0}
.term-output .line.b{font-weight:700}
.term-output .line.big{font-size:11px;line-height:1.15;letter-spacing:0}
.term-output .line.cmd{margin-top:4px;color:var(--green);font-weight:700}
.term-output .line.cmd::before{content:'❯ ';color:var(--green-dim)}
.term-input-line{display:flex;align-items:center;gap:8px;padding:6px 0 10px;flex-shrink:0;border-top:1px solid rgba(0,255,65,0.08)}
.term-prompt{font-size:13px;font-weight:700;color:var(--green);text-shadow:0 0 6px var(--green);white-space:nowrap}
.term-prompt .host{color:var(--purple)}
.term-input{flex:1;background:transparent;border:none;color:var(--green);font-family:var(--font);font-size:13px;outline:none;caret-color:var(--green);text-shadow:0 0 6px var(--green)}
.term-input::placeholder{color:rgba(0,255,65,0.15);font-size:12px}
.term-cursor{display:inline-block;width:8px;height:15px;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1s step-end infinite;margin-left:-3px}
/* Progress bars */
.prog-bar{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:12px}
.prog-track{flex:1;height:16px;background:rgba(0,20,0,0.8);border:1px solid var(--green-dim);border-radius:3px;overflow:hidden;max-width:280px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .15s;box-shadow:0 0 12px var(--green)}
.prog-label{color:var(--green-dim);font-size:10px;min-width:30px;text-align:right;font-weight:700}
/* Boot screen */
.boot-screen{position:absolute;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font);transition:opacity .5s}
.boot-screen.hide{opacity:0;pointer-events:none}
.boot-ascii{font-size:7px;line-height:1.1;color:var(--purple);text-shadow:0 0 20px var(--purple);text-align:center;margin-bottom:20px;white-space:pre}
.boot-bar{width:300px;height:4px;background:rgba(0,20,0,0.8);border:1px solid var(--green-dim);border-radius:4px;overflow:hidden;margin:8px auto}
.boot-fill{height:100%;width:0%;background:var(--green);box-shadow:0 0 16px var(--green);transition:width .3s}
.boot-text{color:var(--green-dim);font-size:11px;letter-spacing:2px;margin-top:10px;font-weight:500}
/* Snow toggle */
.snow-btn{position:fixed;bottom:20px;right:20px;z-index:50;background:rgba(0,10,0,0.7);border:1px solid var(--purple-dim);border-radius:10px;color:var(--purple);padding:8px 14px;font-family:var(--font);font-size:11px;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px)}
.snow-btn:hover{border-color:var(--purple);box-shadow:0 0 16px var(--purple-dim)}
/* Responsive */
@media(max-width:600px){
  .term-header{flex-wrap:wrap;gap:4px;padding:8px 12px}
  .term-stats{font-size:8px;gap:8px}
  .term-title{font-size:10px}
  .term-body{padding:6px 10px 2px}
  .term-output .line{font-size:11px}
  .term-output .line.big{font-size:8px}
  .term-input,.term-prompt{font-size:11px}
  .boot-ascii{font-size:3px}
  .boot-bar{width:200px}
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<canvas id="snow-canvas"></canvas>

<div class="boot-screen" id="boot">
  <div class="boot-ascii" id="boot-ascii"></div>
  <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>
  <div class="boot-text" id="boot-text">INICIALIZANDO...</div>
</div>

<div class="terminal" id="terminal">
  <div class="term-header">
    <div class="term-title">TILINX TERMINAL <span style="color:var(--purple)">v10</span> <span class="blink">█</span></div>
    <div class="term-stats">
      <span><span class="dot"></span> ONLINE</span>
      <span id="term-fps">FPS: --</span>
      <span id="term-cpu">CPU: --%</span>
      <span id="term-ram">RAM: --%</span>
    </div>
  </div>
  <div class="term-body" id="term-body">
    <div class="term-output" id="term-output"></div>
    <div class="term-input-line">
      <span class="term-prompt"><span class="host">root</span>@tilinx:~$</span>
      <input class="term-input" id="term-input" type="text" placeholder="type help" spellcheck="false" autocomplete="off" autofocus/>
    </div>
  </div>
</div>

<button class="snow-btn" id="snow-btn" onclick="toggleSnow()">❄ NIEVE</button>

<script>
// ═══════════════════════════════════════════════════════════
// GLOBAL ERROR HANDLER — ensures boot() always runs
// ═══════════════════════════════════════════════════════════
;(function(){
  let bootCalled=false
  function safeBoot(){
    if(bootCalled)return;bootCalled=true
    if(typeof boot==="function")boot()
  }
  window.addEventListener("error",function(){setTimeout(safeBoot,500)})
  window._safeBoot=safeBoot
})()

// ═══════════════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════════
const BOOT_ASCII=`
████████╗██╗██╗     ██╗███╗   ██╗██╗  ██╗
╚══██╔══╝██║██║     ██║████╗  ██║╚██╗██╔╝
   ██║   ██║██║     ██║██╔██╗ ██║ ╚███╔╝
   ██║   ██║██║     ██║██║╚██╗██║ ██╔██╗
   ██║   ██║███████╗██║██║ ╚████║██╔╝ ██╗
   ╚═╝   ╚═╝╚══════╝╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝
`

const BOOT_MESSAGES=[
  "Booting TilinX Terminal...",
  "Loading Modules...",
  "Initializing System...",
  "Connection Established",
  "Terminal Ready"
]

const TERM=document.getElementById("terminal")
const OUTPUT=document.getElementById("term-output")
const INPUT=document.getElementById("term-input")
const BODY=document.getElementById("term-body")
const BOOT=document.getElementById("boot")
const BOOT_FILL=document.getElementById("boot-fill")
const BOOT_TEXT=document.getElementById("boot-text")
const BOOT_ASCII_EL=document.getElementById("boot-ascii")

let history=[]
let hIdx=-1
let snowOn=true

function boot(){
  BOOT_ASCII_EL.textContent=BOOT_ASCII
  let p=0
  const bootInt=setInterval(()=>{
    p+=Math.random()*18+4
    if(p>=100){p=100;clearInterval(bootInt)}
    BOOT_FILL.style.width=p+"%"
    const idx=Math.min(Math.floor(p/20),BOOT_MESSAGES.length-1)
    if(BOOT_TEXT)BOOT_TEXT.textContent=BOOT_MESSAGES[idx]
  },180)
  setTimeout(()=>{
    BOOT.classList.add("hide")
    if(INPUT)INPUT.focus()
    showHelp()
    updateHeader()
    setInterval(updateHeader,2000)
  },2800)
}

// ═══════════════════════════════════════════════════════════
// MATRIX RAIN
// ═══════════════════════════════════════════════════════════
;(function(){
  try{
    const c=document.getElementById("matrix-canvas");if(!c)return
    const ctx=c.getContext("2d")
    const chars="アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモラリルレロ01"
    let w,h,drops=[]
    function resize(){w=c.width=innerWidth;h=c.height=innerHeight;const n=Math.ceil(w/18);while(drops.length<n)drops.push(Math.random()*-h/18);drops=drops.slice(0,n)}
    function draw(){
      ctx.fillStyle="rgba(0,0,0,0.06)";ctx.fillRect(0,0,w,h)
      for(let i=0;i<drops.length;i++){
        const ch=chars[Math.random()*chars.length|0]
        const a=Math.random()>0.95?0.7:0.08+Math.random()*0.12
        ctx.fillStyle=`rgba(0,255,65,${a})`;ctx.font="12px JetBrains Mono,monospace"
        ctx.fillText(ch,i*18,drops[i]*18)
        if(drops[i]*18>h&&Math.random()>0.975)drops[i]=0
        drops[i]+=0.4+Math.random()*0.3
      }
      requestAnimationFrame(draw)
    }
    resize();window.addEventListener("resize",resize);draw()
  }catch(e){console.error("Matrix error:",e)}
})()

// ═══════════════════════════════════════════════════════════
// PURPLE SNOW
// ═══════════════════════════════════════════════════════════
;(function(){
  try{
    const c=document.getElementById("snow-canvas");if(!c)return
    const ctx=c.getContext("2d")
    let w,h,flakes=[]
    function resize(){w=c.width=innerWidth;h=c.height=innerHeight}
    function init(){resize();flakes=Array.from({length:80},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2.5+1,s:Math.random()*0.7+0.2,o:Math.random()*0.5+0.15,w:Math.random()*2-1}))}
    function draw(){
      ctx.clearRect(0,0,w,h)
      if(!snowOn){requestAnimationFrame(draw);return}
      for(const f of flakes){
        f.y+=f.s;f.x+=Math.sin(f.y*0.01)*0.3+f.w*0.1
        if(f.y>h+10){f.y=-10;f.x=Math.random()*w}
        if(f.x<0)f.x=w;if(f.x>w)f.x=0
        ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
        ctx.fillStyle=`rgba(180,74,255,${f.o})`;ctx.fill()
        ctx.shadowColor="rgba(180,74,255,0.4)";ctx.shadowBlur=8
      }
      requestAnimationFrame(draw)
    }
    resize();window.addEventListener("resize",()=>{resize();init()});init();draw()
  }catch(e){console.error("Snow error:",e)}
})()

function toggleSnow(){snowOn=!snowOn;document.getElementById("snow-btn").textContent=snowOn?"❄ NIEVE":"☀ SIN NIEVE"}

// ═══════════════════════════════════════════════════════════
// HEADER STATS
// ═══════════════════════════════════════════════════════════
function updateHeader(){
  document.getElementById("term-fps").textContent="FPS: "+(60+Math.floor(Math.random()*70))
  document.getElementById("term-cpu").textContent="CPU: "+(20+Math.floor(Math.random()*40))+"%"
  document.getElementById("term-ram").textContent="RAM: "+(30+Math.floor(Math.random()*35))+"%"
}

// ═══════════════════════════════════════════════════════════
// TERMINAL OUTPUT
// ═══════════════════════════════════════════════════════════
function print(html,cls=""){
  const d=document.createElement("div");d.className="line "+cls;d.innerHTML=html;OUTPUT.appendChild(d)
  BODY.scrollTop=BODY.scrollHeight
}

function printCmd(cmd){
  const d=document.createElement("div");d.className="line cmd";d.textContent=cmd;OUTPUT.appendChild(d)
  BODY.scrollTop=BODY.scrollHeight
}

// ═══════════════════════════════════════════════════════════
// COMMAND PROCESSOR
// ═══════════════════════════════════════════════════════════
async function processCmd(cmd){
  const parts=cmd.trim().split(/\s+/)
  const c=parts[0].toLowerCase()
  const arg=parts.slice(1).join(" ")

  if(!cmd.trim())return

  printCmd(cmd)
  history.push(cmd.trim())
  hIdx=history.length

  try{
  switch(c){
    case "help":cmdHelp(arg);break
    case "clear":OUTPUT.innerHTML="";break
    case "history":cmdHistory();break
    case "whoami":cmdWhoami();break
    case "date":print(new Date().toLocaleString("es-DO",{timeZone:"America/Santo_Domingo"})+" AST");break
    case "neofetch":cmdNeofetch();break
    case "system":cmdSystem();break
    case "cpu":cmdCpu();break
    case "ram":cmdRam();break
    case "gpu":cmdGpu();break
    case "disk":cmdDisk();break
    case "temperature":cmdTemperature();break
    case "temp":cmdTemperature();break
    case "network":cmdNetwork();break
    case "internet":cmdInternet();break
    case "ping":cmdPing(arg);break
    case "services":cmdServices();break
    case "monitor":cmdMonitor();break
    case "status":cmdStatus();break
    case "logs":cmdLogs();break
    case "report":cmdReport();break
    case "security":cmdSecurity();break
    case "fps":cmdFps();break
    case "optimizer":cmdOptimizer();break
    case "boost":cmdBoost();break
    case "turbo":cmdTurbo();break
    case "ultra":cmdUltra();break
    case "sensitivity":cmdSensitivity();break
    case "crosshair":cmdCrosshair();break
    case "tracking":cmdTracking();break
    case "reaction":cmdReaction();break
    case "training":cmdTraining();break
    case "movement":cmdMovement();break
    case "aimtest":cmdAimtest();break
    case "godmode":cmdGodmode();break
    case "snow":snowOn=!snowOn;print(snowOn?"❄ Nieve morada activada":"☀ Nieve desactivada",snowOn?"purple":"dim");document.getElementById("snow-btn").textContent=snowOn?"❄ NIEVE":"☀ SIN NIEVE";break
    case "matrix":cmdMatrix();break
    case "color":cmdColor(arg);break
    case "uptime":print("Uptime: "+fmtUptime(Math.floor(Math.random()*86400*7+86400)));break
    case "exit":print("Sesión terminada.","dim");break
    case "restart":print("Reiniciando sistema...","yellow");setTimeout(()=>{OUTPUT.innerHTML="";print("Sistema reiniciado ✅","green")},800);break
    case "shutdown":print("Apagando...","red");setTimeout(()=>{OUTPUT.innerHTML="";print("Sistema apagado","dim")},1000);break
    default:print(`Comando desconocido: "${c}". Escribe help para ver los comandos.`,"red")
  }
  }catch(e){print("Error: "+e.message,"red")}
}

// ═══════════════════════════════════════════════════════════
// HELP
// ═══════════════════════════════════════════════════════════
function showHelp(){cmdHelp()}

function cmdHelp(filter){
  const cmds={
    system:"Información del sistema",
    cpu:"Detalles de la CPU",
    ram:"Uso de memoria RAM",
    gpu:"Información de la GPU",
    disk:"Uso del disco",
    temp:"Temperatura del sistema",
    network:"Interfaces de red",
    internet:"Estado de conexión",
    ping:"<host> — Prueba de latencia",
    fps:"Analizador de FPS",
    optimizer:"Optimizar sistema",
    boost:"Modo rendimiento",
    turbo:"Turbo mode +25%",
    ultra:"Ultra rendimiento",
    sensitivity:"Analizar sensibilidad",
    crosshair:"Configurar mira",
    tracking:"Análisis de tracking",
    reaction:"Tiempo de reacción",
    training:"Centro de entrenamiento",
    movement:"Análisis de movimiento",
    aimtest:"Prueba de precisión",
    godmode:"Activar todos los módulos",
    services:"Servicios activos",
    monitor:"Monitor en tiempo real",
    status:"Estado del sistema",
    logs:"Registros del sistema",
    report:"Generar reporte",
    security:"Escaneo de seguridad",
    neofetch:"Info del sistema estilo neofetch",
    whoami:"Usuario actual",
    history:"Historial de comandos",
    date:"Fecha y hora actual",
    clear:"Limpiar terminal",
    snow:"Activar/desactivar nieve",
    matrix:"Efecto matrix",
    color:"<color> — Cambiar color (green|purple|blue|red|pink)",
    uptime:"Tiempo activo del sistema",
    exit:"Cerrar sesión",
    restart:"Reiniciar sistema",
    shutdown:"Apagar sistema",
    help:"<comando> — Ayuda detallada"
  }

  if(filter){
    if(cmds[filter]){print(`<span style="color:var(--green);font-weight:700">${filter}</span> — ${cmds[filter]}`,"green")}
    else{print(`No hay ayuda disponible para "${filter}"`,"red")}
    return
  }

  const groups={
    "⚙ SISTEMA":["system","cpu","ram","gpu","disk","temp","network","internet","uptime","neofetch","whoami","date"],
    "📊 MONITOREO":["status","monitor","logs","report","security","services","ping"],
    "🎮 GAMING":["fps","optimizer","boost","turbo","ultra","sensitivity","crosshair","tracking","reaction","training","movement","aimtest"],
    "⚡ ÉPICO":["godmode"],
    "🛠 TERMINAL":["help","clear","history","snow","matrix","color","exit","restart","shutdown"]
  }

  print("<span style='color:var(--purple);font-weight:700'>╔══════════════════════════════════════╗</span>","big")
  print("<span style='color:var(--purple);font-weight:700'>║        TILINX TERMINAL V10           ║</span>","big")
  print("<span style='color:var(--purple);font-weight:700'>╚══════════════════════════════════════╝</span>","big")
  print("")

  for(const [group,list] of Object.entries(groups)){
    print(`<span style="color:var(--pink)">${group}</span>`,"b")
    for(const k of list){
      print(`  <span style="color:var(--green);font-weight:700">${k.padEnd(12)}</span> <span style="color:rgba(0,255,65,0.4)">${cmds[k]||''}</span>`)
    }
    print("")
  }

  print("<span style='color:var(--green-dim)'>Escribe help [comando] para ayuda detallada.</span>","dim")
}

// ═══════════════════════════════════════════════════════════
// SYSTEM COMMANDS
// ═══════════════════════════════════════════════════════════
function cmdSystem(){
  const d=new Date()
  print("╔══════════════════════════════════╗","dim")
  print("║        SYSTEM INFORMATION        ║","green")
  print("╚══════════════════════════════════╝","dim")
  print(`OS ................ <span style="color:var(--green)">TilinX OS v10.0.0 (x86_64)</span>`)
  print(`Kernel ........... <span style="color:var(--green)">6.8.0-tilinx-amd64</span>`)
  print(`Host ............. <span style="color:var(--green)">TilinX-PRO-7</span>`)
  print(`Uptime ........... <span style="color:var(--green)">${fmtUptime(Math.floor(Math.random()*86400*14+3600))}</span>`)
  print(`Shell ............ <span style="color:var(--green)">TilinX SH v10</span>`)
  print(`Terminal ......... <span style="color:var(--green)">TilinX Terminal v10 GOD EDITION</span>`)
  print(`Date ............. <span style="color:var(--green)">${d.toLocaleDateString("es-DO")} ${d.toLocaleTimeString("es-DO")}</span>`)
  print(`Users ............ <span style="color:var(--green)">root (admin)</span>`)
  print(`Locale ........... <span style="color:var(--green)">es_DO.UTF-8</span>`)
}

function cmdCpu(){
  const cores=Math.floor(Math.random()*4+8)
  const arch=["x86_64","aarch64","amd64"][Math.floor(Math.random()*3)]
  const freq=(3.2+Math.random()*2.8).toFixed(1)
  const usage=20+Math.floor(Math.random()*50)
  print("╔══════════════════════════════════╗","dim")
  print("║           CPU INFORMATION        ║","green")
  print("╚══════════════════════════════════╝","dim")
  print(`Model ........... <span style="color:var(--green)">AMD Ryzen 9 ${Math.floor(5000+Math.random()*2000)}X</span>`)
  print(`Architecture .... <span style="color:var(--green)">${arch}</span>`)
  print(`Cores ........... <span style="color:var(--green)">${cores}C / ${Math.floor(cores*2)}T</span>`)
  print(`Frequency ....... <span style="color:var(--green)">${freq} GHz</span>`)
  print(`Usage ........... <span style="color:var(--green)">${usage}%</span>`)
  const bar="█".repeat(Math.floor(usage/4))+"░".repeat(25-Math.floor(usage/4))
  print(`Load ............ <span style="color:var(--green)">[${bar}]</span>`)
  print(`Cache ........... <span style="color:var(--green)">L1: 512K | L2: 8M | L3: 64M</span>`)
  print(`Temperature ..... <span style="color:${usage>60?'#ff4444':'var(--green)'}">${(45+usage*0.3).toFixed(1)}°C</span>`)
}

function cmdRam(){
  const total=16+Math.floor(Math.random()*16)
  const used=Math.floor(total*(0.3+Math.random()*0.4))
  const free=total-used
  const pct=Math.floor(used/total*100)
  print("╔══════════════════════════════════╗","dim")
  print("║          MEMORY INFORMATION      ║","green")

let reactTimeout=null
function cmdReaction(){
  if(reactTimeout){print("Ya hay una prueba en curso.","yellow");return}
  print("🎯 PRUEBA DE REACCIÓN","yellow")
  print("Espera la señal... presiona ESPACIO cuando veas el 🟢")
  let started=false,startTime=0,fired=false
  const timeout=setTimeout(()=>{
    started=true
    print("""")
    print(`<span style="color:var(--green);font-size:20px;font-weight:700">🟢 ¡YA!</span>`)
    startTime=Date.now()
  },1500+Math.random()*2500)
  const handler=(e)=>{
    if(e.key===" "){
      e.preventDefault()
      if(!started){print("¡Muy rápido! Espera la señal 🟢","red");clearTimeout(timeout);reactTimeout=null;document.removeEventListener("keydown",handler);return}
      if(fired)return;fired=true
      const ms=Date.now()-startTime
      if(ms<150)print(`<span style="color:var(--green)">⏱ ${ms} ms — 🔥 IMPRESIONANTE</span>`)
      else if(ms<250)print(`<span style="color:var(--green)">⏱ ${ms} ms — 🎯 BUENO</span>`)
      else if(ms<400)print(`<span style="color:#ffdd44">⏱ ${ms} ms — 😐 NORMAL</span>`)
      else print(`<span style="color:#ff4444">⏱ ${ms} ms — 🐢 NECESITAS PRÁCTICA</span>`)
      reactTimeout=null
      document.removeEventListener("keydown",handler)
    }
  }
  reactTimeout={timeout,handler}
  document.addEventListener("keydown",handler)
}

function fmtUptime(s){
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60)
  return `${d}d ${h}h ${m}m`
}

// ═══════════════════════════════════════════════════════════
// INPUT HANDLER
// ═══════════════════════════════════════════════════════════
if(INPUT)INPUT.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault()
    const cmd=INPUT.value
    INPUT.value=""
    processCmd(cmd)
  }else if(e.key==="ArrowUp"){
    e.preventDefault()
    if(hIdx>0){hIdx--;INPUT.value=history[hIdx]}
  }else if(e.key==="ArrowDown"){
    e.preventDefault()
    if(hIdx<history.length-1){hIdx++;INPUT.value=history[hIdx]}
    else{hIdx=history.length;INPUT.value=""}
  }else if(e.key==="Tab"){
    e.preventDefault()
    const partial=INPUT.value.toLowerCase()
    const cmds=["help","clear","history","whoami","date","neofetch","system","cpu","ram","gpu","disk","temp","temperature","network","internet","ping","services","monitor","status","logs","report","security","fps","optimizer","boost","turbo","ultra","sensitivity","crosshair","tracking","reaction","training","movement","aimtest","godmode","snow","matrix","color","uptime","exit","restart","shutdown"]
    const match=cmds.find(c=>c.startsWith(partial))
    if(match&&partial)INPUT.value=match
  }
})
