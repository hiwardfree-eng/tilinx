<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TilinX — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#8b5cf6;--purple-lt:#c084fc;--purple-glow:rgba(139,92,246,0.35);
  --pink:#e879f9;--blue:#60a5fa;--green:#34d399;--red:#f87171;--amber:#fbbf24;
  --bg:#060410;--surface:rgba(16,10,35,0.95);--surface2:rgba(22,14,46,0.9);
  --border:rgba(139,92,246,0.22);--border-lt:rgba(139,92,246,0.1);
  --text:#ede9fe;--muted:rgba(196,181,253,0.5);
}
body.theme-light{--bg:#f4efff;--surface:rgba(255,255,255,0.92);--border:rgba(139,92,246,0.2);--border-lt:rgba(139,92,246,0.08);--text:#1e0a3c;--muted:rgba(100,60,170,0.5);--purple:#7c3aed;--purple-lt:#6d28d9}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif}
#matrix{position:fixed;inset:0;z-index:0;pointer-events:none}
.page{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center}
.page.active{display:flex}
.login-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:48px 44px 40px;width:400px;max-width:94vw;
  backdrop-filter:blur(24px);
  box-shadow:0 0 80px rgba(139,92,246,0.1),0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05)
}
.brand{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:8px}
.brand-icon{
  width:48px;height:48px;background:linear-gradient(135deg,#7c3aed,#c084fc);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:24px;box-shadow:0 0 24px rgba(139,92,246,0.5),0 0 60px rgba(139,92,246,0.2)
}
.brand-name{
  font-family:'Cinzel Decorative',serif;font-size:2rem;font-weight:900;
  background:linear-gradient(135deg,#e9d5ff,#c084fc,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.04em
}
.brand-sub{text-align:center;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:36px;font-weight:600}
.field{margin-bottom:18px}
.field label{
  display:block;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(196,181,253,0.55);font-weight:700;margin-bottom:8px
}
.field input{
  width:100%;background:rgba(8,4,20,0.9);border:1px solid rgba(139,92,246,0.2);
  border-radius:12px;padding:13px 16px;font-size:.92rem;font-family:'Inter',sans-serif;
  color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s
}
.field input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
.field input::placeholder{color:rgba(140,120,200,0.3)}
.login-err{min-height:22px;font-size:.8rem;color:#f87171;text-align:center;margin-bottom:6px}
.btn-login{
  width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#6d28d9);
  border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.02em;
  box-shadow:0 4px 24px rgba(124,58,237,0.4),0 0 60px rgba(124,58,237,0.1);
  transition:opacity .15s,transform .12s,box-shadow .15s
}
.btn-login:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.5)}
.btn-login:active{transform:translateY(0)}
#pg-login{background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(139,92,246,0.08) 0%,transparent 70%)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div id="pg-login" class="page active">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <span class="brand-name">tilinX</span>
    </div>
    <p class="brand-sub">Command Center</p>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="inp-user" placeholder="tu usuario" autocomplete="username" autofocus/>
    </div>
    <div class="field">
      <label>Key / Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="login-err" id="login-err"></div>
    <div id="tfa-section" style="display:none;margin-bottom:12px">
      <label style="display:block;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(196,181,253,0.55);font-weight:700;margin-bottom:8px">Código 2FA</label>
      <input type="text" id="inp-tfa" placeholder="000000" style="width:100%;background:rgba(8,4,20,0.9);border:1px solid rgba(139,92,246,0.2);border-radius:12px;padding:13px 16px;font-size:.92rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;text-align:center;letter-spacing:8px;font-weight:700"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Iniciar sesión →</button>
    <div style="margin-top:16px;text-align:center">
      <button onclick="document.body.classList.toggle('theme-light');localStorage.setItem('tilinx_theme',document.body.classList.contains('theme-light')?'light':'dark')" style="background:none;border:1px solid currentColor;color:currentColor;border-radius:50%;width:30px;height:30px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;vertical-align:middle" title="Cambiar tema">☾</button>
      <a href="/home" style="color:rgba(180,80,255,0.5);font-size:12px;font-family:monospace;vertical-align:middle">← BACK TO SITE</a>
    </div>
  </div>
</div>

<script>
var loginStep = 'credentials';
function doLogin(){
  const user=document.getElementById('inp-user').value;
  const pass=document.getElementById('inp-pass').value;
  const tfa=document.getElementById('inp-tfa');
  const err=document.getElementById('login-err');
  if(loginStep === 'tfa') {
    if(!tfa.value){err.textContent='Ingresa el código 2FA.';return}
    fetch('/api/tfa-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:tfa.value})})
      .then(r=>r.json().then(d=>{if(r.ok&&d.redirect)window.location.href=d.redirect;else{err.textContent=d.error||'Código inválido';tfa.value='';tfa.focus()}}))
      .catch(e=>{err.textContent='Error: '+(e.message||'')})
    return
  }
  if(!user||!pass){err.textContent='Ingresa usuario y key.';return}
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,key:pass})})
    .then(r=>r.json().then(d=>{
      if(r.ok && d.tfa_required) {
        loginStep = 'tfa';
        document.getElementById('tfa-section').style.display = 'block';
        document.querySelector('.btn-login').textContent = 'Verificar 2FA →';
        err.textContent = 'Ingresa el código de Google Authenticator';
        tfa.focus();
        return
      }
      if(r.ok&&d.redirect)window.location.href=d.redirect;else{err.textContent=d.error||'Credenciales inválidas.';const c=document.querySelector('.login-card');c.style.animation='none';c.offsetHeight;c.style.animation='shake .4s ease'}
    }))
    .catch(e=>{err.textContent='Error de conexión: '+(e.message||'')})
}
document.addEventListener('keydown',function(e){var k=e.key||'';if((k==='Enter'||e.keyCode===13)&&document.getElementById('pg-login').classList.contains('active'))doLogin()});

(function(){
  const canvas=document.getElementById('matrix'),ctx=canvas.getContext('2d');
  const KAT='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモ01アイウ10110'.split('');
  const W=22;let drops=[],anim;
  function resize(){
    canvas.width=innerWidth;canvas.height=innerHeight;
    const n=Math.ceil(canvas.width/W);
    if(drops.length<n)drops=[...drops,...Array.from({length:n-drops.length},()=>Math.random()*-(canvas.height/W))];
    else drops=drops.slice(0,n);
  }
  function draw(){
    ctx.fillStyle='rgba(6,4,16,0.055)';ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<drops.length;i++){
      const ch=KAT[Math.random()*KAT.length|0];
      const bright=Math.random()>0.92;
      if(bright){ctx.fillStyle='rgba(230,210,255,0.7)';ctx.font='bold 13px JetBrains Mono,monospace'}
      else{const a=0.06+Math.random()*0.16;ctx.fillStyle=`rgba(139,92,246,${a})`;ctx.font='13px JetBrains Mono,monospace'}
      ctx.fillText(ch,i*W,drops[i]*W);
      if(drops[i]*W>canvas.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=0.38;
    }
    anim=requestAnimationFrame(draw);
  }
  resize();window.addEventListener('resize',resize);anim=requestAnimationFrame(draw);
})();
if(localStorage.getItem('tilinx_theme')==='light')document.body.classList.add('theme-light');
</script>
</body>
</html>
