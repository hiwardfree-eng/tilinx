<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilinX - Login</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="login-box">
  <h1 style="font-family:monospace;color:rgba(180,80,255,0.9);letter-spacing:2px">⚡ TILINX</h1>
  <form id="login-form">
    <input class="form-control" id="password" type="password" placeholder="PASSWORD" autofocus style="text-align:center;letter-spacing:2px">
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">ENTER</button>
    <div id="login-error" style="color:var(--red-bright);margin-top:12px;display:none;font-family:monospace;font-size:13px">INVALID PASSWORD</div>
    <div style="margin-top:16px"><a href="/" style="color:rgba(180,80,255,0.6);font-size:12px;font-family:monospace">← BACK TO SITE</a></div>
  </form>
</div>

<script src="/assets/js/main.js"></script>
</body>
</html>
