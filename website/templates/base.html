@media (max-width: 768px) {

  }
  .page-wrap.slide-left {
    animation: slideInRight 0.35s ease-out;
  }
  .page-wrap.slide-right {
    animation: slideInLeft 0.35s ease-out;
  }
  @keyframes slideInRight {
    from { transform: translateX(80px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-80px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
}

<script>
// ─── Theme toggle (dark/light) ──────────────────────────
(function(){
  var theme = localStorage.getItem('tilinx_theme');
  if (theme === 'light') {
    document.body.classList.add('theme-light');
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.innerHTML = '\u2600';
  }
})();
function toggleTheme(){
  var body = document.body;
  var btn = document.getElementById('theme-toggle');
  body.classList.toggle('theme-light');
  if (body.classList.contains('theme-light')) {
    localStorage.setItem('tilinx_theme', 'light');
    if (btn) btn.innerHTML = '\u2600';
  } else {
    localStorage.setItem('tilinx_theme', 'dark');
    if (btn) btn.innerHTML = '\u263e';
  }
}
</script>
{% block scripts %}{% endblock %}

<script>
// ─── Swipe navigation (mobile) ───────────────────────────
(function(){
  var isMobile = window.innerWidth <= 768;
  if (!isMobile) return;

  var routes = ['/home','/terminal','/status','/downloads','/contact'];
  var current = routes.indexOf(window.location.pathname);
  if (current === -1) return;

  var startX = 0, startY = 0, isDragging = false, swiping = false;
  var wrap = document.getElementById('page-wrap');

  function updateTab(idx) {
    document.querySelectorAll('.bt-tab').forEach(function(t, i) {
      t.classList.toggle('active', i === idx);
    });
  }
  updateTab(current);

  document.addEventListener('touchstart', function(e) {
    startX = e.changedTouches[0].screenX;
    startY = e.changedTouches[0].screenY;
    isDragging = true;
    swiping = false;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    var dx = e.changedTouches[0].screenX - startX;
    var dy = e.changedTouches[0].screenY - startY;
    if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      swiping = true;
      var tr = Math.max(-80, Math.min(80, dx * 0.3));
      wrap.style.transform = 'translateX(' + tr + 'px)';
      wrap.style.transition = 'none';
      wrap.style.opacity = 1 - Math.abs(dx) * 0.003;
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isDragging) return;
    isDragging = false;
    var dx = e.changedTouches[0].screenX - startX;
    wrap.style.transform = '';
    wrap.style.transition = '';
    wrap.style.opacity = '';

    if (!swiping || Math.abs(dx) < 50) return;

    var dir = dx > 0 ? -1 : 1;
    var next = current + dir;
    if (next < 0 || next >= routes.length) return;

    sessionStorage.setItem('slideDir', dir === 1 ? 'left' : 'right');
    wrap.style.animation = 'none';
    setTimeout(function() { window.location.href = routes[next]; }, 80);
  }, { passive: true });

  document.addEventListener('mousedown', function(e) {
    if (window.innerWidth > 768) return;
    startX = e.screenX;
    startY = e.screenY;
    isDragging = true;
    swiping = false;
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var dx = e.screenX - startX;
    var dy = e.screenY - startY;
    if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      swiping = true;
      var tr = Math.max(-80, Math.min(80, dx * 0.3));
      wrap.style.transform = 'translateX(' + tr + 'px)';
      wrap.style.transition = 'none';
      wrap.style.opacity = 1 - Math.abs(dx) * 0.003;
    }
  });

  document.addEventListener('mouseup', function(e) {
    if (!isDragging) return;
    isDragging = false;
    var dx = e.screenX - startX;
    wrap.style.transform = '';
    wrap.style.transition = '';
    wrap.style.opacity = '';

    if (!swiping || Math.abs(dx) < 50) return;
    var dir = dx > 0 ? -1 : 1;
    var next = current + dir;
    if (next < 0 || next >= routes.length) return;

    sessionStorage.setItem('slideDir', dir === 1 ? 'left' : 'right');
    wrap.style.animation = 'none';
    setTimeout(function() { window.location.href = routes[next]; }, 80);
  });

  var slideDir = sessionStorage.getItem('slideDir');
  if (slideDir && wrap) {
    wrap.classList.add('slide-' + slideDir);
    sessionStorage.removeItem('slideDir');
  }
})();
</script>
