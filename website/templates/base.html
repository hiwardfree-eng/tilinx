<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}TilinX{% endblock %}</title>
<meta name="description" content="TilinX - Advanced proxy platform">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta property="og:title" content="TilinX">
<meta property="og:description" content="Advanced proxy platform">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
{% block head %}{% endblock %}
</head>
<body style="-webkit-user-select:none;user-select:none;-webkit-touch-callout:none" oncontextmenu="return false" onkeydown="if(event.key==='F12'||(event.ctrlKey&&event.shiftKey&&['I','C','J','U','P'].indexOf(event.key)!==-1)||(event.ctrlKey&&['u','s','p','r'].indexOf(event.key.toLowerCase())!==-1)||event.key==='PrintScreen'){event.preventDefault();return false}">

<canvas id="bg-canvas"></canvas>
<canvas id="snow-canvas"></canvas>

<nav>
  <a href="/home" class="nav-logo"><img src="/assets/img/bolt.png" class="nav-bolt" alt=""> TILINX</a>
  <ul class="nav-links">
    <li><a href="/home">HOME</a></li>
    <li><a href="/terminal">TERMINAL</a></li>
    <li><a href="/status">STATUS</a></li>
    <li><a href="/downloads">INF DEL PROXY</a></li>
    <li><a href="/contact">CONTACT</a></li>
  </ul>
  <div class="nav-right">
    <button class="menu-btn" id="menu-btn">☰</button>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>⚡ TILINX &mdash; <a href="/login" style="color:inherit;text-decoration:none;cursor:pointer" title="Admin Access">2026</a></p>
</footer>

<script src="/assets/js/main.js"></script>
<script>if(window.location.pathname==='/admin'){setInterval(function(){fetch('/api/status',{method:'GET',cache:'no-store'}).catch(function(){})},300000)}</script>
{% block scripts %}{% endblock %}
</body>
</html>
