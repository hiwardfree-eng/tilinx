<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TilinX - Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
.admin-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
.nav-admin { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
.nav-admin a { color:rgba(180,80,255,0.7); text-decoration:none; padding:8px 16px; border-radius:8px; border:2px solid rgba(130,0,255,0.4); font-size:12px; font-family:monospace; letter-spacing:1px; transition:all .3s; }
.nav-admin a:hover { border-color:var(--accent); color:var(--accent); }
#logout-btn { margin-left:auto; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
  <a href="/" class="nav-logo">⚡ TILINX</a>
  <div class="nav-right"></div>
</nav>

<div style="padding:100px 20px 30px;max-width:1100px;margin:0 auto;position:relative;z-index:1">

  <div class="nav-admin">
    <a href="/">← SITE</a>
    <a href="#" style="border-color:var(--accent);color:var(--accent)">📊 DASHBOARD</a>
    <button class="btn btn-sm btn-outline" id="logout-btn">LOGOUT</button>
  </div>

  <div class="admin-grid">
    <div class="stat-card"><div class="num" id="admin-cpu">—</div><div class="lbl">CPU</div></div>
    <div class="stat-card"><div class="num" id="admin-ram">—</div><div class="lbl">RAM</div></div>
    <div class="stat-card"><div class="num" id="admin-disk">—</div><div class="lbl">DISK</div></div>
    <div class="stat-card"><div class="num" id="admin-uptime">—</div><div class="lbl">UPTIME</div></div>
  </div>

  <h3 style="font-family:monospace;font-size:16px;color:rgba(180,80,255,0.9);margin-bottom:12px">📋 ACTIVITY</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>LEVEL</th><th>EVENT</th><th>DETAIL</th><th>TIME</th></tr></thead>
      <tbody id="logs-body"><tr><td colspan="4" style="text-align:center;color:rgba(180,80,255,0.5)">LOADING...</td></tr></tbody>
    </table>
  </div>
</div>

<script src="/assets/js/main.js"></script>
<script src="/assets/js/dashboard.js"></script>
</body>
</html>
